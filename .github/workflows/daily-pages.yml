name: Daily Steam archive and Pages deploy

on:
  workflow_dispatch:
  schedule:
    # 09:35 Asia/Shanghai, written in UTC. Avoid the top of the hour.
    - cron: "35 1 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: steam-launch-tracker-pages
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect and archive data
        run: npm run daily

      - name: Build static Pages site
        run: npm run build:pages

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.json data/archive.json data/archive.csv
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update Steam launch archive"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
